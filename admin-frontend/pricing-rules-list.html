<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Rules - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal h2 { margin-bottom: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: .5rem; }
        .coupon-code-row { display: flex; gap: .5rem; }
        .coupon-code-row input { flex: 1; }
        .coupon-badge {
            display: inline-block;
            padding: .25rem .6rem;
            border-radius: 4px;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .coupon-active { background: #d4edda; color: #155724; }
        .coupon-inactive { background: #f8d7da; color: #721c24; }
        .coupon-scheduled { background: #fff3cd; color: #856404; }
    </style>
</head>

<body>
    <!-- Coupon Modal -->
    <div class="modal-overlay" id="coupon-modal">
        <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto;">
            <h2><i class="fas fa-ticket-alt"></i> Create Coupon</h2>

            <!-- Code + Generate -->
            <div class="form-group" style="margin-bottom:1rem;">
                <label>Coupon Code <span style="color:var(--danger)">*</span></label>
                <div class="coupon-code-row">
                    <input type="text" id="coupon-code" placeholder="e.g. SAVE20" style="text-transform:uppercase;font-weight:700;letter-spacing:2px;" oninput="this.value=this.value.toUpperCase()">
                    <button class="btn btn-outline" type="button" onclick="generateCouponCode()" title="Generate random code">
                        <i class="fas fa-random"></i> Generate
                    </button>
                </div>
            </div>

            <!-- Discount + Description -->
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:.75rem;margin-bottom:1rem;">
                <div class="form-group">
                    <label>Discount % <span style="color:var(--danger)">*</span></label>
                    <input type="number" id="coupon-discount" placeholder="e.g. 15" min="1" max="100">
                    <small style="color:var(--text-light);">1 – 100</small>
                </div>
                <div class="form-group">
                    <label>Description <span style="color:var(--text-light);font-weight:400;">(optional)</span></label>
                    <input type="text" id="coupon-description" placeholder="e.g. Weekend special discount">
                </div>
            </div>

            <!-- Valid From / Valid Until -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;">
                <div class="form-group">
                    <label>Valid From <span style="color:var(--text-light);font-weight:400;">(optional)</span></label>
                    <input type="datetime-local" id="coupon-valid-from">
                </div>
                <div class="form-group">
                    <label>Valid Until <span style="color:var(--text-light);font-weight:400;">(optional)</span></label>
                    <input type="datetime-local" id="coupon-valid-until">
                </div>
            </div>

            <!-- Max Uses -->
            <div class="form-group" style="margin-bottom:1rem;">
                <label>Max Uses <span style="color:var(--text-light);font-weight:400;">(optional — leave blank for unlimited)</span></label>
                <input type="number" id="coupon-max-uses" placeholder="e.g. 100" min="1">
            </div>

            <!-- Applicable Hubs -->
            <div class="form-group" style="margin-bottom:1rem;">
                <label>Applicable Hubs</label>
                <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                    <input type="checkbox" id="all-hubs-cb" onchange="toggleAllHubs(this.checked)">
                    <label for="all-hubs-cb" style="margin:0;font-weight:400;font-size:.9rem;">All Hubs</label>
                </div>
                <select id="hub-select" onchange="addHubTag(this)" style="width:100%;padding:.5rem;border:1px solid var(--border);border-radius:4px;">
                    <option value="">-- Select a hub to add --</option>
                </select>
                <div id="hub-tags" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;"></div>
            </div>

            <!-- Applicable Workspaces -->
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label>Applicable Workspaces</label>
                <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                    <input type="checkbox" id="all-workspaces-cb" onchange="toggleAllWorkspaces(this.checked)">
                    <label for="all-workspaces-cb" style="margin:0;font-weight:400;font-size:.9rem;">All Workspaces</label>
                </div>
                <select id="workspace-select" onchange="addWorkspaceTag(this)" style="width:100%;padding:.5rem;border:1px solid var(--border);border-radius:4px;">
                    <option value="">-- Select a workspace to add --</option>
                </select>
                <div id="workspace-tags" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;"></div>
            </div>

            <div style="display:flex;gap:.75rem;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="closeCouponModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCoupon()"><i class="fas fa-save"></i> Save Coupon</button>
            </div>
        </div>
    </div>

    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-tags"></i> Pricing Rules</h1>
            <span style="color:var(--text-light);font-size:.9rem;" id="last-updated"></span>
            <div style="display:flex;gap:.75rem;">
                <button class="btn btn-outline" onclick="openCouponModal()">
                    <i class="fas fa-ticket-alt"></i> Add Coupon
                </button>
                <a href="pricing-rule-form.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Rule
                </a>
            </div>
        </header>
        <div class="admin-content">
            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search rules..." oninput="filterRules()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-type" onchange="filterRules()">
                        <option value="">All Types</option>
                        <option value="peak_hours">Peak Hours</option>
                        <option value="weekend">Weekend</option>
                        <option value="demand">High Demand</option>
                        <option value="time_based">Time Based</option>
                        <option value="day_based">Day Based</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Workspace</th>
                                    <th>Type</th>
                                    <th>% Modifier</th>
                                    <th>Flat Modifier</th>
                                    <th>Time Range</th>
                                    <th>Days</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="rules-table">
                                <tr>
                                    <td colspan="8" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Coupons Section -->
            <div class="card" style="margin-top:1.5rem;">
                <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
                    <h2><i class="fas fa-ticket-alt"></i> Special Discount Coupons</h2>
                    <button class="btn btn-primary btn-sm" onclick="openCouponModal()">
                        <i class="fas fa-plus"></i> Add Coupon
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Discount</th>
                                    <th>Description</th>
                                    <th>Valid Period</th>
                                    <th>Scope</th>
                                    <th>Uses</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="coupons-table">
                                <tr>
                                    <td colspan="7" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/pricing-rules-list.js"></script>
</body>

</html>
