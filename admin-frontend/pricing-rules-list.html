<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Rules - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-tags"></i> Pricing Rules</h1>
            <a href="pricing-rule-form.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Rule
            </a>
        </header>
        <div class="admin-content">
            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search rules..." oninput="filterRules()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-type" onchange="filterRules()">
                        <option value="">All Types</option>
                        <option value="peak_hours">Peak Hours</option>
                        <option value="weekend">Weekend</option>
                        <option value="bulk">Bulk Discount</option>
                        <option value="early_bird">Early Bird</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th><th>Name</th><th>Type</th><th>Modifier (%)</th>
                                    <th>Active</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="rules-table">
                                <tr><td colspan="6" style="text-align:center;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading…
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/pricing-rules-list.js"></script>
</body>
</html>
