<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubs - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-building"></i> Working Hubs</h1>
            <a href="hub-form.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Hub
            </a>
        </header>
        <div class="admin-content">
            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search hubs..." oninput="filterHubs()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-city" onchange="filterHubs()">
                        <option value="">All Cities</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th><th>Name</th><th>City</th><th>State</th>
                                    <th>Address</th><th>Workspaces</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="hubs-table">
                                <tr><td colspan="7" style="text-align:center;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading…
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/hubs-list.js"></script>
</body>
</html>
