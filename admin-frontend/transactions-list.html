<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-receipt"></i> All Transactions</h1>
        </header>
        <div class="admin-content">
            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <i class="fas fa-receipt"></i>
                    <div><div class="value" id="total-count">—</div><div class="label">Total</div></div>
                </div>
                <div class="stat-card green">
                    <i class="fas fa-check-circle"></i>
                    <div><div class="value" id="success-count">—</div><div class="label">Successful</div></div>
                </div>
                <div class="stat-card red">
                    <i class="fas fa-times-circle"></i>
                    <div><div class="value" id="failed-count">—</div><div class="label">Failed</div></div>
                </div>
                <div class="stat-card yellow">
                    <i class="fas fa-rupee-sign"></i>
                    <div><div class="value" id="total-revenue">—</div><div class="label">Revenue</div></div>
                </div>
            </div>

            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search transactions..." oninput="filterTransactions()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-status" onchange="filterTransactions()">
                        <option value="">All Statuses</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <div class="toolbar-filter">
                    <select id="filter-method" onchange="filterTransactions()">
                        <option value="">All Methods</option>
                        <option value="card">Card</option>
                        <option value="upi">UPI</option>
                        <option value="netbanking">Net Banking</option>
                        <option value="wallet">Wallet</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Transaction ID</th><th>Booking ID</th><th>Guest</th>
                                    <th>Amount</th><th>Method</th><th>Status</th><th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="transactions-table">
                                <tr><td colspan="7" style="text-align:center;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading…
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/transactions-list.js"></script>
</body>
</html>
